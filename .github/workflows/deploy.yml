name: Build & Validate CryptoPulse

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Airflow Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.airflow
        push: false
        tags: cryptopulse-airflow:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Create .env for validation
      run: |
        cat > .env << EOF
        POSTGRES_HOST=localhost
        POSTGRES_PORT=5432
        POSTGRES_USER=postgres
        POSTGRES_PASSWORD=dummy
        POSTGRES_DB=postgres
        AWS_REGION=ap-southeast-2
        AWS_BUCKET_NAME=dummy-bucket
        ATHENA_DATABASE=gold_layer
        ATHENA_S3_STAGING_DIR=s3://dummy/staging/
        EOF
    
    - name: Validate docker-compose.yaml
      run: |
        # Install docker-compose-cli
        sudo apt-get update
        sudo apt-get install -y docker-compose-v2
        docker compose config > /dev/null && echo "✓ docker-compose valid"
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Validate DAG syntax
      run: |
        pip install apache-airflow-core
        python -m py_compile src/orchestrator/crypto_dag.py
        echo "✓ DAG syntax valid"
    
    - name: Validate Python scripts
      run: |
        python -m py_compile src/ingestion/ingest_crypto.py
        python -m py_compile src/transformation/spark_process.py
        python -m py_compile src/transformation/gold_analytics.py
        python -m py_compile src/dashboard/app.py
        echo "✓ All Python scripts valid"
    
    - name: Check requirements.txt
      run: |
        pip install --dry-run -r requirements.txt
        echo "✓ All requirements available"
    
    - name: Security check with Bandit
      run: |
        pip install bandit
        bandit -r src/ -ll -f json -o bandit-report.json || true
        echo "✓ Security check complete"
    
    - name: Upload build artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build-info
        path: |
          docker-compose.yaml
          Dockerfile.airflow
          requirements.txt
