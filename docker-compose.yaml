services:
  spark:
    image: apache/spark:3.5.0
    container_name: spark-master
    command: >
      bash -c "pip install python-dotenv && 
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark --port 7077"
    env_file:
      - .env 
    environment:
      - SPARK_MODE=master
      - HOME=/tmp
    ports:
      - '8888:8080'
      - '7077:7077'
    volumes:
      - .:/opt/spark/app
    working_dir: /opt/spark/app
    networks:
      - spark-network

  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark-worker
    command: >
      bash -c "pip install python-dotenv && 
      sleep 10 && 
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker 
      --cores 2 --memory 2G 
      --host spark-worker 
      --port 8081 
      --webui-port 8082 
      spark://spark:7077"
    env_file:
      - .env
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark:7077
      - HOME=/tmp
    ports:
      - '8082:8082' # ui port for worker
    depends_on:
      - spark
    volumes:
      - .:/opt/spark/app # Mount the current directory to the worker container
    working_dir: /opt/spark/app
    networks:
      - spark-network

networks:
  spark-network:
    driver: bridge